<!DOCTYPE html>
<html class="light" lang="pt-pt">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Seleccionar Conta | Info Cliente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@600;700;800&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link href="/assets/styles/tailwind-app.css" rel="stylesheet" />
  <link href="/assets/styles/shared-ui.css" rel="stylesheet" />
  <style>
    :root {
      --primary: #2afc8d;
      --bg-dark: #070a13;
    }

    body {
      background: radial-gradient(circle at top right, #1e293b 0%, var(--bg-dark) 100%);
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      color: white;
      overflow-x: hidden;
    }

    .glow {
      position: fixed;
      width: 400px;
      height: 400px;
      background: var(--primary);
      filter: blur(150px);
      opacity: 0.05;
      z-index: -1;
      pointer-events: none;
    }

    .selection-container {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 48px;
      width: 100%;
      max-width: 520px;
      padding: 60px 45px;
      box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.5);
      margin: 20px;
      animation: cardEnter 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      text-align: center;
    }

    @keyframes cardEnter {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .welcome-text {
      font-family: 'Outfit', sans-serif;
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 10px;
      background: linear-gradient(to bottom, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 40px;
      font-weight: 500;
    }

    .accounts-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      max-height: 400px;
      overflow-y: auto;
      padding-right: 10px;
    }

    .accounts-grid::-webkit-scrollbar {
      width: 6px;
    }
    .accounts-grid::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
    }

    .account-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
      text-align: left;
    }

    .account-card:hover {
      background: rgba(42, 252, 141, 0.05);
      border-color: var(--primary);
      transform: translateX(8px);
    }

    .client-avatar {
      width: 60px;
      height: 60px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      color: var(--primary);
      font-size: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      overflow: hidden;
    }

    .client-avatar img {
      width: 100%;
      height: 100%;
      object-cover: cover;
    }

    .client-info h3 {
      font-size: 18px;
      font-weight: 700;
      color: white;
      margin: 0;
    }

    .client-info p {
      font-size: 12px;
      color: #64748b;
      margin-top: 4px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .btn-back {
      margin-top: 30px;
      font-size: 12px;
      font-weight: 700;
      color: #64748b;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: color 0.2s;
    }

    .btn-back:hover {
      color: white;
    }

    #loadingOverlay {
        position: fixed;
        inset: 0;
        background: rgba(7, 10, 19, 0.8);
        backdrop-filter: blur(10px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        flex-direction: column;
        gap: 20px;
    }

    .loader {
        width: 48px;
        height: 48px;
        border: 4px solid var(--primary);
        border-bottom-color: transparent;
        border-radius: 50%;
        animation: rotation 1s linear infinite;
    }

    @keyframes rotation {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div class="glow" style="top: -100px; right: -100px;"></div>
  <div class="glow" style="bottom: -100px; left: -100px; background: #6366f1; opacity: 0.03;"></div>

  <div class="selection-container">
    <div class="mb-4">
        <span class="material-symbols-outlined text-5xl text-[#2afc8d]">account_circle</span>
    </div>
    <h1 class="welcome-text" id="welcomeUser">Bem-vindo!</h1>
    <p class="subtitle">Seleccione a conta que deseja aceder para continuar.</p>

    <div id="accountsList" class="accounts-grid">
      <!-- Logic will inject cards here -->
    </div>

    <a href="login.html" class="btn-back">
      <span class="material-symbols-outlined text-sm">arrow_back</span>
      Sair e entrar com outra conta
    </a>
  </div>

  <div id="loadingOverlay">
      <div class="loader"></div>
      <div class="text-[12px] font-black uppercase tracking-[0.2em] text-[#2afc8d]">Acedendo à conta...</div>
  </div>

  <script type="module" src="./accountSelection.js"></script>
</body>

</html>
