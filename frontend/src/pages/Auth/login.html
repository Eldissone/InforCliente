<!DOCTYPE html>
<html class="light" lang="pt-pt">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Login | Info Cliente</title>
  <link rel="icon" href="../../assets/icon/favicon.ico" type="image/x-icon">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@600;700;800&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link href="/assets/styles/tailwind-app.css" rel="stylesheet" />
  <link href="/assets/styles/shared-ui.css" rel="stylesheet" />
  <style>
    :root {
      --primary: #2afc8d;
      --bg-dark: #070a13;
    }

    body {
      background: radial-gradient(circle at top right, #1e293b 0%, var(--bg-dark) 100%);
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      color: white;
      overflow-x: hidden;
    }

    /* Ambient Glows */
    .glow {
      position: fixed;
      width: 400px;
      height: 400px;
      background: var(--primary);
      filter: blur(150px);
      opacity: 0.05;
      z-index: -1;
      pointer-events: none;
    }

    .login-container {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 48px;
      width: 100%;
      max-width: 480px;
      padding: 60px 45px;
      box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.5);
      margin: 20px;
      animation: cardEnter 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes cardEnter {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-header {
      margin-bottom: 45px;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 24px;
      font-weight: 800;
      color: white;
      letter-spacing: -0.02em;
    }

    .logo-pill {
      width: 60px;
      height: 32px;
      background: var(--primary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0F172A;
      font-family: 'Inter', sans-serif;
      font-weight: 900;
      font-style: italic;
    }

    .login-title {
      font-size: 38px;
      font-weight: 800;
      margin-top: 25px;
      position: relative;
      display: inline-block;
    }

    .login-title::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -4px;
      width: 45px;
      height: 6px;
      background: var(--primary);
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(42, 252, 141, 0.4);
    }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #94a3b8;
      margin-bottom: 12px;
      margin-left: 4px;
    }

    .input-wrapper {
      position: relative;
      transition: all 0.3s;
    }

    .input-field {
      width: 100%;
      height: 60px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 0 24px;
      font-size: 14px;
      color: white;
      transition: all 0.3s ease;
      outline: none;
    }

    .input-field::placeholder {
      color: #475569;
    }

    .input-field:focus {
      background: rgba(255, 255, 255, 0.06);
      border-color: var(--primary);
      box-shadow: 0 0 20px rgba(42, 252, 141, 0.1);
    }

    .btn-signin {
      width: 100%;
      height: 60px;
      background: linear-gradient(135deg, #2afc8d 0%, #10b981 100%);
      border-radius: 20px;
      color: #070a13;
      font-weight: 800;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 30px;
      transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
      box-shadow: 0 10px 25px rgba(42, 252, 141, 0.2);
    }

    .btn-signin:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 35px rgba(42, 252, 141, 0.3);
      filter: brightness(1.1);
    }

    .social-btn {
      flex: 1;
      height: 54px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 12px;
      font-weight: 700;
      color: #cbd5e1;
      transition: all 0.3s;
    }

    .social-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
      color: white;
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 30px 0;
      color: #475569;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .divider:not(:empty)::before {
      margin-right: 20px;
    }

    .divider:not(:empty)::after {
      margin-left: 20px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: #94a3b8;
      font-weight: 600;
      cursor: pointer;
    }

    .remember-me input {
      accent-color: var(--primary);
      width: 16px;
      height: 16px;
    }

    .forgot-password {
      font-size: 12px;
      color: var(--primary);
      font-weight: 700;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .forgot-password:hover {
      opacity: 0.8;
    }

    .error-box {
      margin-top: 20px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 16px;
      padding: 16px;
      font-size: 12px;
      font-weight: 600;
      color: #f87171;
      text-align: center;
    }

    /* Mobile Optimizations */
    @media (max-width: 640px) {
      .login-container {
        padding: 45px 30px;
        border-radius: 32px;
        margin: 16px;
      }

      .login-title {
        font-size: 30px;
      }

      .login-header {
        margin-bottom: 35px;
      }

      .btn-signin, .input-field {
        height: 56px;
      }

      .divider {
        margin: 20px 0;
      }
    }
  </style>
</head>

<body>
  <!-- Glow Elements -->
  <div class="glow" style="top: -100px; right: -100px;"></div>
  <div class="glow" style="bottom: -100px; left: -100px; background: #6366f1; opacity: 0.03;"></div>

  <div class="login-container">
    <div class="login-header text-center sm:text-left">
      <div class="logo-badge mb-4 justify-center sm:justify-start">
        <div class="logo-pill">Info</div>
        <span>Cliente</span>
      </div>
      <h1 class="login-title">Acesso</h1>
    </div>

    <form id="loginForm" class="space-y-7">
      <div class="form-group">
        <label for="email">Endereço de Email</label>
        <div class="input-wrapper">
          <input id="email" type="email" class="input-field" placeholder="nome@empresa.com" required />
        </div>
      </div>

      <div class="form-group mt-4">
        <label for="password">Chave de Segurança</label>
        <div class="relative">
          <input id="password" type="password" class="input-field pr-12" placeholder="••••••••" required />
          <button type="button" id="togglePassword"
            class="absolute right-0 mr-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white transition-colors">
            <span class="material-symbols-outlined text-xl">visibility</span>
          </button>
        </div>
      </div>

      <div class="flex mt-4 items-center justify-between px-1">
        <label class="remember-me">
          <input type="checkbox">
          Manter sessão
        </label>

      </div>

      <button id="submitBtn" type="submit" class="btn-signin">
        Entrar no Sistema
      </button>

      <div id="errorBox" class="hidden error-box"></div>
    </form>

    <div class="divider"><a href="#" class="forgot-password">Recuperar senha?</a></div>


    <div class="text-center mt-4 pt-4 border-t border-white/5">
      <p class="text-[12px] text-slate-500 font-medium tracking-tight">
        Não tem uma conta?
        <a href="#" class="text-[#2afc8d] font-bold hover:underline transition-all">Solicitar Acesso</a>
      </p>
    </div>
  </div>

  <script type="module" src="./login.js"></script>
</body>

</html>
